common:
    # 必须与 rosbag / 驱动实际话题一致（见 multi_lidar_data.bag）：
    #   左雷达：/left/rslidar_points   右雷达：/right/rslidar_points
    #   车身 IMU：/imu/data   左雷达 IMU：/left/rslidar_imu_data   右：/right/rslidar_imu_data
    # 本栈单路激光：默认左雷达；换右侧时改 lid_topic，并建议 imu 用同侧 rslidar_imu_data。
    lid_topic:  "/left/rslidar_points"
    imu_topic:  "/left/rslidar_imu_data"
    time_sync_en: false

preprocess:
    # 7 = ROBOSENSE（速腾 PointCloud2：x,y,z,intensity,timestamp,ring）
    lidar_type: 7
    # 线数按机型修改：RS16=16，RS32=32，RS128=128 等
    scan_line: 32
    scan_rate: 10
    blind: 0.5
    point_filter_num: 1
    # 速腾：雷达坐标系 z（高度）滤除，单位米
    height_min: -2.0
    height_max: 0.5

mapping:
    down_sample_size: 0.3
    max_iteration: 3
    voxel_size: 0.5
    max_layer: 4
    layer_point_size: [ 5, 5, 5, 5, 5 ]
    plannar_threshold: 0.01
    max_points_size: 1000
    max_cov_points_size: 1000
    fov_degree:    360
    det_range:     100.0
    extrinsic_est_en:  false
    extrinsic_T: [ 0, 0, 0 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1 ]

noise_model:
    ranging_cov: 0.02
    angle_cov: 0.05
    acc_cov: 0.5
    gyr_cov: 0.25
    b_acc_cov: 0.0043
    b_gyr_cov: 0.000266

publish:
    pub_voxel_map: false
    publish_max_voxel_layer: 2
    path_en:  true
    scan_publish_en:  true
    dense_publish_en: false
    scan_bodyframe_pub_en: true

pcd_save:
    pcd_save_en: false
    interval: -1

btsa:
    time_slice: 20
    vel_thre: 0.2
    range_x: 100
    range_y: 100
    range_z: 5
    filter_size_map: 0.4
    match_points: 20
    if_detect_drop: true
    detect_cnt_thre: 3
    use_radius_search: false
    neighborhood_size: 15
    neighbourhood_radius: 0.2
    scc_voxel_size: 0.2
    scc_voxel_time: 2
