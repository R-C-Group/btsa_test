common:
    lid_topic:  "/velodyne_points"
    imu_topic:  "/imu/data"
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible

preprocess:
    lidar_type: 2                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR,
    scan_line: 16
    scan_rate: 10                # only need to be set for velodyne, unit: Hz,
    blind: 2
    point_filter_num: 3

mapping:
    down_sample_size: 0.4
    max_iteration: 5
    voxel_size: 0.75
    max_layer: 4                # 4 layer, 0, 1, 2, 3
    layer_point_size: [ 5, 5, 5, 5, 5 ]
    plannar_threshold: 0.01
    max_points_size: 1000
    max_cov_points_size: 1000

    fov_degree:    360
    det_range:     100.0
    extrinsic_est_en:  true      # true: enable the online estimation of IMU-LiDAR extrinsic,
    extrinsic_T: [0.010965, -0.086864, 0.060426]
    extrinsic_R: [  0.9989892,  0.0444870, -0.0064406,  
                    -0.0446353,  0.9986885, -0.0250789, 
                    0.0053164,  0.0253410,  0.9996647 ]

noise_model:
    ranging_cov: 0.04
    angle_cov: 0.1
    acc_cov: 0.2
    gyr_cov: 0.05
    b_acc_cov: 0.0043
    b_gyr_cov: 0.000266


publish:
    pub_voxel_map: false
    publish_max_voxel_layer: 1         # only publish 0,1,2 layer's plane
    path_en:  true
    scan_publish_en:  true       # false: close all the point cloud output
    dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

pcd_save:
    pcd_save_en: false
    interval: -1                 # how many LiDAR frames saved in each pcd file;
    # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.

btsa:
    time_slice: 20              # time slice for scan matching and dynamic object detection in the ikdtree
    vel_thre: 0.1          # velocity threshold for dynamic object detection
    range_x: 50
    range_y: 50
    range_z: 5
    filter_size_map: 0.4
    match_points: 20